name: Build Native Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      # Generate the Android native project fresh (same pattern as Cordova sample)
      # This avoids stale committed configs, missing local.properties, etc.
      - name: Add Android Platform
        run: npx cap add android

      # Generate local.properties with the SDK path the runner just set up
      - name: Generate local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      # Sync Capacitor config, plugins and web assets into the fresh Android project
      - name: Capacitor Sync
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

