name: Build Native Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # ANDROID — Produces a debug APK (Live Wrapper → Vercel)
  # ─────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node 20 LTS — Capacitor officially supports 18 & 20 only
      - name: Set up Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # Java 17 is required by Gradle / Android build tools
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Explicitly install Android SDK so ANDROID_HOME is always set
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # local.properties is gitignored but Gradle REQUIRES it to find the SDK.
      # We generate it here pointing at the SDK the runner just installed.
      - name: Generate local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      # cap sync: copies config + installs native plugins + updates Gradle deps
      # This is needed even for live-wrapper apps to wire Capacitor plugins.
      - name: Capacitor Sync Android
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      # --no-daemon   → prevents memory leaks on CI
      # --stacktrace  → shows full error if build fails
      # -Xmx2g        → caps JVM at 2 GB (GitHub runner limit is ~6 GB but safe)
      - name: Build debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
