name: Build Native Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Capacitor Sync
        run: npx cap sync android
        
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    name: Build iOS Simulator
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Capacitor Sync
        run: npx cap sync ios
        
      - name: Build iOS (Simulator)
        run: |
          npx cap open ios
          # We build for simulator because real device requires signing certificates
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -sdk iphonesimulator -configuration Debug -derivedDataPath build
          
      - name: Zip iOS App
        run: |
          cd build/Build/Products/Debug-iphonesimulator
          zip -r ../../../AI-Centre-iOS.zip App.app
          
      - name: Upload iOS Zip
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-simulator
          path: AI-Centre-iOS.zip
